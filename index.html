<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMOJI OVERLOAD</title>
</head>
<body>
    <script src="https://addsoupbase.github.io/favourites/utils.js"></script>
    <script>
        ;!async function(){
            let emojis = new Set(JSON.parse(await (await fetch('./emojis.txt')).text()))

            emojis.forEach(o=>{
            new Elem({tag:'img', src:o,parent:body,styles:{width:'10%',height:'10%'}, events:{
                error(){
                        this.src = this.src.replace('.gif','.webp')
                    this.content.noevent('error')
                }
            }})
        })
        }()
             
    </script>
</body>
</html>
