<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMOJI OVERLOAD</title>
    <style>
        button {
            border: none;
            background-color: rgb(102, 217, 102);
            border-radius: 5px;
            margin: 20px;
            transform: scale(1.3, 1.3)
        }

        button:hover {
            background-color: rgb(90, 187, 90);
        }

        body {
            text-align: center;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        img {
            display: inline-block;
            width: 90px;
            height: 90px;
            --content-visibility: auto;
        }

        label {
            margin: 20px
        }

        select {
            border-radius: 15px;
            width: 120px;
            height: 30px;
            background-color: #1d8a7a;
            border-color: #176b5e;
            border-width: 2px;
            border-style: solid;
            text-align: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        img[data-loaded="true"] {
            cursor: pointer;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" async></script>
</head>

<body style="background-color: grey;">
    <h1>I did <strong>not</strong> make these emojis</h1>
    <aside>pls tell me if you find any duplicates</aside>
    <label>
        Image Rendering
        <select id="imgrendering">
            <option value="pixelated">Pixelated</option>
            <option value="auto">Auto</option>
            <!-- <option value="smooth">Smooth</option> -->
            <!-- <option value="crisp-edges">Crisp Edges</option> -->
        </select>
    </label>
    <script type="module">
        import { jason, } from '../arrays.js'
        import $ from '../yay.js'
        import { download } from '../handle.js'
        let all = []
        $.gid('imgrendering').on({
            change() {
                $.body.setStyles({
                    'image-rendering': this.value
                })
            }
        })
        $.body.setStyles({
            'image-rendering': 'pixelated'
        })
            .delegate({
                async dblclick() {
                    let src = new URL(this.attr.src, location.href)
                    try {
                        await navigator.clipboard.writeText(src)
                    }
                    catch {
                        prompt('Image source:', src)
                    }
                },
                contentvisibilityautostatechange(e) {
                    !(e.skipped) ?
                        this.setAttr({ src: this.dataset.src }) : this.removeAttribute('src')
                }
            })
        let data = await jason('./emojis.json')
        let blobs = new Set
        let button = $('div', { parent: document.body }).$('<button>Loading...</button>', {
            // parent: document.body,
            attr: {
                disabled: true
            },
            events: { _click }
        })
        button.busy(true)
        let badBrowser = 'mozInnerScreenX' in window || typeof ContentVisibilityAutoStateChangeEvent === 'undefined'
            let container = $('div', { parent: document.body, attr: { role: 'img' } })
        container.busy(true)
        container.push(...data.map(map))
        function map(src, index) {
            src = `./emojis/${src}`
            const attr = { src, alt: `#${index + 1}`, title: `Emoji ${index + 1}`, }
            all.push(fetch(src).then(o => o.blob().then(o => { blobs.add([o, src.split('/').at(-1)]); $.qs(`img[data-src="${src}"]`).setAttr({ $loaded: 'true' }) })))
            let out = $(`<img width="300" height="300" data-src="${src}" alt="#${index + 1}" title="Emoji ${index + 1}">`,)
            badBrowser && setTimeout(() => {
                if (out.isVisible) out.attr.src=out.attr['data-src']
            })
            return out
        }
        Promise.all(all).then(() => {
            button.setAttr({ disabled: false })
            container.busy(false)
            button.busy(false)
            button.innerHTML = `Download All (${data.length})`
        })
        async function _click() {
            this.setAttributes({ disabled: true })
            let zip = JSZip()
            console.log("Downloading...")
            blobs.forEach(([blob, name]) => {
                zip.file(name, blob)
            })
            download(await zip.generateAsync({ type: 'blob' }))
            this.setAttributes({ disabled: false })
        }
    </script>

</body>

</html>
