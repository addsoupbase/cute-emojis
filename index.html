<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMOJI OVERLOAD</title>
    <style>
    button{border:none; background-color: rgb(102, 217, 102);border-radius: 5px;}
    button:hover {
        background-color: rgb(90, 187, 90);
    }
    img{width:100px;height:100px;image-rendering: pixelated;}</style>
</head>

<body style="background-color: grey;">
    <script type="module">
        let data = await(await fetch('./emojis.json')).json()
        import $,{getProxy} from 'https://addsoupbase.github.io/quick.js'
        getProxy(document.body).offsprings = data.map(map)
        function map(src,index) {
            return $('img', {src:`./emojis/${src}`,title:`Emoji ${index+1}`})
        }
      /*  $('button', {
            parent:document.body,
            txt:'Download All'
        })*/
    </script>
</body>

</html>
